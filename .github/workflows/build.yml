name: build

# Собирает Genomed VPN под Windows, macOS и Linux.
# Запуск: push тега вида v1.0.0  ИЛИ  вручную через вкладку Actions (workflow_dispatch).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest   # -> .msi
            args: ""
          - platform: macos-latest      # -> .dmg / .app (universal: Intel + Apple Silicon)
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04      # -> .deb / .AppImage
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Системные зависимости webview только для Linux (WebKitGTK для Tauri v1)
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # для universal-сборки под macOS нужны обе цели
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # Официальный экшен Tauri: собирает и, при наличии тега, публикует релиз с артефактами
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "Genomed VPN ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Копии со стабильными именами (без версии) — чтобы ссылки .../releases/latest/download/<имя>
      # на help-странице работали и не ломались при выходе новой версии.
      - name: Stable-named asset (Windows)
        if: matrix.platform == 'windows-latest' && github.ref_type == 'tag'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          f=$(ls src-tauri/target/release/bundle/msi/*.msi | head -1)
          cp "$f" "Genomed-VPN-x64.msi"
          gh release upload "${{ github.ref_name }}" "Genomed-VPN-x64.msi" --clobber

      - name: Stable-named asset (macOS)
        if: matrix.platform == 'macos-latest' && github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          f=$(ls src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          cp "$f" "Genomed-VPN-universal.dmg"
          gh release upload "${{ github.ref_name }}" "Genomed-VPN-universal.dmg" --clobber

      - name: Stable-named assets (Linux)
        if: matrix.platform == 'ubuntu-22.04' && github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          deb=$(ls src-tauri/target/release/bundle/deb/*.deb | head -1)
          app=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          cp "$deb" "Genomed-VPN-amd64.deb"
          cp "$app" "Genomed-VPN-x86_64.AppImage"
          gh release upload "${{ github.ref_name }}" "Genomed-VPN-amd64.deb" "Genomed-VPN-x86_64.AppImage" --clobber

      # Если запустили вручную (без тега) — сложим бинарники как artifacts прогона
      - name: Upload artifacts (manual runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: genomed-vpn-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
          if-no-files-found: ignore
